<div class="page-container">
  <div class="page-header">
    <div class="title-section">
      <h1>Detalle del Alumno</h1>
      <p>Información completa del alumno.</p>
    </div>
    <div class="action-section">
      <button class="btn btn-secondary" (click)="volver()">Volver</button>
    </div>
  </div>

  @if (loading) {
    <div class="loading-state">Cargando datos...</div>
  } @else if (alumno) {
    <div class="card">
      <div class="detail-grid">
        <div class="detail-item">
          <span class="detail-label">ID</span>
          <span class="detail-value">#{{ alumno.id }}</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">Nombre Completo</span>
          <span class="detail-value">{{ alumno.nombre }} {{ alumno.apellidos }}</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">iPasen</span>
          <span class="detail-value"><code class="code-badge">{{ alumno.ipasen }}</code></span>
        </div>
      </div>
    </div>
  } @else {
    <div class="error-state">No se ha encontrado el alumno.</div>
  }
</div>
